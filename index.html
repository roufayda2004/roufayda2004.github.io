<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري للقمصان</title>
    <!-- استدعاء مكتبة PayPal لدعم الدفع بـ Visa/Mastercard/PayPal -->
    <!-- تنبيه: استبدل YOUR_CLIENT_ID بمعرف العميل الخاص بحسابك في بايبال -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=USD"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e74c3c;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }
        .products-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
        }
        .price {
            font-size: 1.2em;
            color: var(--secondary-color);
            font-weight: bold;
            margin: 10px 0;
        }
        button.add-to-cart {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
            transition: 0.3s;
        }
        button.add-to-cart:hover {
            background-color: #34495e;
        }
        .cart-section {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            height: fit-content;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        #paypal-button-container {
            margin-top: 20px;
            display: none; /* مخفي حتى يتم إضافة منتجات */
        }
    </style>
</head>
<body>

    <header>
        <h1>متجر القمصان الحصري</h1>
        <p>أفضل التصميمات بجودة عالية</p>
    </header>

    <div class="container">
        <!-- قسم المنتجات -->
        <div class="products-grid">
            <!-- المنتج الأول -->
            <div class="product-card">
                <!-- يمكنك رفع صورك وتغيير الرابط هنا -->
                <img src="https://via.placeholder.com/250x250?text=T-Shirt+1" alt="قميص أسود">
                <h3>قميص أسود كلاسيكي</h3>
                <div class="price">25.00$</div>
                <button class="add-to-cart" onclick="addToCart('قميص أسود كلاسيكي', 25.00)">أضف إلى السلة</button>
            </div>

            <!-- المنتج الثاني -->
            <div class="product-card">
                <img src="https://via.placeholder.com/250x250?text=T-Shirt+2" alt="قميص أبيض">
                <h3>قميص أبيض رياضي</h3>
                <div class="price">30.00$</div>
                <button class="add-to-cart" onclick="addToCart('قميص أبيض رياضي', 30.00)">أضف إلى السلة</button>
            </div>
            
            <!-- يمكنك نسخ ولصق الـ product-card لإضافة قمصان أو منتجات أخرى -->
        </div>

        <!-- قسم سلة المشتريات والدفع -->
        <div class="cart-section">
            <h2>سلة المشتريات</h2>
            <div id="cart-items">
                <p>السلة فارغة حالياً.</p>
            </div>
            <h3 id="total-price" style="display: none;">المجموع: <span id="total-amount">0</span>$</h3>
            
            <!-- أزرار الدفع (تظهر تلقائياً عبر سكربت بايبال) -->
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        // دالة لإضافة المنتجات للسلة
        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateCartDisplay();
        }

        // دالة لتحديث واجهة السلة
        function updateCartDisplay() {
            const cartItemsDiv = document.getElementById('cart-items');
            const totalElement = document.getElementById('total-price');
            const amountElement = document.getElementById('total-amount');
            const paypalContainer = document.getElementById('paypal-button-container');

            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p>السلة فارغة حالياً.</p>';
                totalElement.style.display = 'none';
                paypalContainer.style.display = 'none';
                return;
            }

            cartItemsDiv.innerHTML = '';
            cart.forEach((item, index) => {
                cartItemsDiv.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>${item.price.toFixed(2)}$</span>
                    </div>
                `;
            });

            amountElement.innerText = total.toFixed(2);
            totalElement.style.display = 'block';
            paypalContainer.style.display = 'block';
        }

        // إعداد أزرار الدفع الخاصة بـ PayPal و Visa/Mastercard
        paypal.Buttons({
            // إنشاء الطلب بالمبلغ الإجمالي
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: total.toFixed(2) // نمرر المجموع الكلي هنا
                        }
                    }]
                });
            },
            // ما يحدث بعد الدفع بنجاح
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('تم الدفع بنجاح بواسطة ' + details.payer.name.given_name + '! سيتم تجهيز طلبك.');
                    // هنا يمكنك إرسال بيانات الطلب إلى قاعدة بياناتك
                    cart = [];
                    total = 0;
                    updateCartDisplay();
                });
            },
            // في حالة إلغاء العملية
            onCancel: function (data) {
                alert('تم إلغاء عملية الدفع.');
            },
            // في حالة حدوث خطأ
            onError: function (err) {
                console.error(err);
                alert('حدث خطأ أثناء معالجة الدفع.');
            }
        }).render('#paypal-button-container'); // عرض الأزرار في هذا القسم
    </script>
</body>
</html>
